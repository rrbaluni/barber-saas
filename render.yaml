services:
  - type: web
    name: barber-saas
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barber-db
          property: connectionString
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: "3001"

databases:
  - name: barber-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
